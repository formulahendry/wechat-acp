# Publish the npm package on GitHub Release.
#
# Requires the `NPM_TOKEN` repository secret with publish access to `wechat-acp`.
# `--provenance` uses the GitHub OIDC token to attach build provenance.

name: publish-on-release

on:
  release:
    types: [created]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - name: Verify package.json version matches release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          pkg_version="$(node -p "require('./package.json').version")"
          tag_version="${RELEASE_TAG#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::Release tag '$RELEASE_TAG' does not match package.json version '$pkg_version'."
            echo "Bump package.json to $tag_version (or retag) and re-run."
            exit 1
          fi
      - run: npm ci
      - name: Verify NPM_TOKEN is configured
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not configured."
            exit 1
          fi
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
